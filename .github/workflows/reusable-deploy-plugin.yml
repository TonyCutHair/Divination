name: 'Deploy Plugin'

on:
  workflow_call:
    inputs:
      plugin-name:
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Artifact (release)
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: '${{ inputs.plugin-name }}'
          path: 'dist/plugins/${{ inputs.plugin-name }}'

      - name: Download Artifact (gitversion.json)
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: '${{ inputs.plugin-name }}-GitVersion'
          path: 'gitversion'

      - name: Read InformationalVersion
        id: version
        run: |
          value=$(cat gitversion/gitversion.json | jq .InformationalVersion)
          rm -rf gitversion
          echo "value=$value" >> $GITHUB_OUTPUT

      - name: Create zip
        run: |
          cd dist/plugins/${{ inputs.plugin-name }}
          zip -r latest.zip . -x "*.zip"

      - name: Update pluginmaster.json
        run: |
          entries=()
          base_url="https://github.com/${{ github.repository }}/raw/master/dist/plugins"

          for dir in dist/plugins/*/; do
            [ -d "$dir" ] || continue
            name=$(basename "$dir")
            json_file="$dir/$name.json"
            [ -f "$json_file" ] || continue

            install_url="$base_url/$name/latest.zip"

            entry=$(cat "$json_file" | jq \
              --arg install "$install_url" \
              --argjson ts "$(date +%s)" \
              '. + {DownloadLinkInstall: $install, DownloadLinkUpdate: $install, DownloadLinkTesting: $install, LastUpdated: $ts, DownloadCount: 0}')

            entries+=("$entry")
          done

          if [ ${#entries[@]} -eq 0 ]; then
            echo "[]" > pluginmaster.json
          else
            printf '%s\n' "${entries[@]}" | jq -s '.' > pluginmaster.json
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/ pluginmaster.json
          git diff --staged --quiet || git commit -m "⚙️ Deploy ${{ inputs.plugin-name }} ${{ steps.version.outputs.value }}"
          git push
