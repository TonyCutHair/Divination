name: CI (AetheryteLinkInChat)

on:
  push:
    paths:
      - AetheryteLinkInChat/**
      - Directory.Build.props
    branches:
      - master
  pull_request:
    paths:
      - AetheryteLinkInChat/**
      - Directory.Build.props
    types:
      - opened
      - synchronize
  release:
    types:
      - created
  workflow_dispatch:

jobs:
  build:
    uses: TonyCutHair/Divination/.github/workflows/reusable-build-plugin.yml@master
    with:
      plugin-name: AetheryteLinkInChat
      working-directory: AetheryteLinkInChat
    permissions:
      contents: read
      actions: write

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    uses: TonyCutHair/Divination/.github/workflows/reusable-deploy-plugin.yml@master
    with:
      plugin-name: AetheryteLinkInChat
      plugin-repository: TonyCutHair/divination-distrib
    secrets:
      DEPLOY_GITHUB_TOKEN: ${{ secrets.DEPLOY_GITHUB_TOKEN }}
    permissions:
      actions: read
